<div id="accountPanel" class="right-panel-content hidden" data-panel="account">
    <div class="panel-header panel-header-with-actions">
        <div class="panel-header-copy">
            <span class="panel-title">Account</span>
        </div>
        <button id="accountBackToSettingsBtn" class="btn btn-secondary panel-header-btn" type="button">Back</button>
    </div>
    <div class="settings-content account-panel-content">
        <div class="account-overview-card account-overview-card-compact">
            <div>
                <div class="account-overview-eyebrow">Grok</div>
                <div id="accountGrokName" class="account-overview-title">Not connected</div>
                <div id="accountGrokMeta" class="account-inline-note">Connect to run chat and tools.</div>
            </div>
            <span id="accountGrokStatusDot" class="provider-status-dot off" aria-hidden="true"></span>
        </div>

        <div id="accountGrokRow" class="provider-row-list">
            <div class="provider-row dim" id="accountGrokProviderRow">
                <span class="provider-logo" id="accountGrokLogo"></span>
                <div class="provider-info">
                    <div class="provider-name">Grok</div>
                    <div class="provider-meta" id="accountGrokStatusText">Not connected</div>
                </div>
                <span class="provider-status-dot off" id="accountGrokRowDot"></span>
                <button class="connect-btn" id="accountGrokConnectBtn" type="button">Connect</button>
            </div>
        </div>

        <!-- Kept for avatar sync / legacy callers; always mirrors Grok identity -->
        <span id="accountUserValue" class="hidden">-</span>
        <div id="accountStatusText" class="account-inline-note"></div>
        <div id="accountStatusTextSignedIn" class="account-inline-note"></div>

        <!-- Legacy managed-billing nodes kept hidden so older listeners null-safe no-op -->
        <div id="accountAuthUnavailable" class="hidden"></div>
        <div id="accountAuthSignedOut" class="hidden"></div>
        <div id="accountAuthSignedIn" class="hidden"></div>
        <input type="hidden" id="accountEmailInput" />
        <input type="hidden" id="accountPasswordInput" />
        <button id="accountSignInBtn" type="button" class="hidden"></button>
        <button id="accountSignUpBtn" type="button" class="hidden"></button>
        <button id="accountGoogleBtn" type="button" class="hidden"></button>
        <button id="accountGithubBtn" type="button" class="hidden"></button>
        <button id="accountUpgradeBtn" type="button" class="hidden"></button>
        <button id="accountManageBtn" type="button" class="hidden"></button>
        <button id="accountRefreshBtn" type="button" class="hidden"></button>
        <button id="accountSignOutBtn" type="button" class="hidden"></button>
        <span id="accountBillingValue" class="hidden"></span>
        <span id="accountPlanValue" class="hidden"></span>
        <span id="accountUsageValue" class="hidden"></span>
        <span id="accountPeriodEndValue" class="hidden"></span>
        <span id="accountRuntimeValue" class="hidden"></span>
    </div>
</div>
