<!-- ===== CONNECT (Grok OAuth + Ollama Cloud API key) ===== -->
<div class="settings-tab-pane" data-pane="providers">
    <select id="activeConfig" class="hidden"><option value="default">Default</option></select>

    <div class="settings-section-label">Grok</div>
    <div id="oauthProviderGrid" class="provider-row-list"></div>
    <div id="oauthDeviceCodePrompt" class="oauth-device-prompt hidden">
        <div class="oauth-device-prompt-inner">
            <div class="oauth-device-prompt-title">Enter code on <span id="oauthDeviceCodeProviderName"></span></div>
            <div id="oauthDeviceCodeValue" class="oauth-device-code-value"></div>
            <div class="oauth-device-prompt-hint">
                Go to <a id="oauthDeviceCodeLink" href="#" target="_blank" rel="noopener"></a> and enter the code above.
            </div>
            <div class="oauth-device-prompt-actions">
                <button id="oauthDeviceCodeCopyBtn" class="btn btn-secondary">Copy Code</button>
                <button id="oauthDeviceCodeOpenBtn" class="btn btn-primary">Open Link</button>
                <button id="oauthDeviceCodeCancelBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <div class="settings-section-label">Ollama Cloud</div>
    <p class="settings-section-desc">Add your Ollama Cloud API key from ollama.com. Keys are stored locally.</p>
    <div id="apiProviderGrid" class="provider-row-list"></div>
    <div id="apiProviderEditor" class="provider-inline-editor hidden">
        <div class="form-group">
            <label for="providerEditorKey">API Key</label>
            <input type="password" id="providerEditorKey" placeholder="Enter your API key..." />
        </div>
        <div class="form-group" id="providerEditorEndpointGroup">
            <label for="providerEditorEndpoint">API URL <span class="optional-badge">optional</span></label>
            <input type="text" id="providerEditorEndpoint" placeholder="https://ollama.com/v1" />
        </div>
        <div class="form-row">
            <button id="providerEditorSaveBtn" class="btn btn-primary" style="flex:1">Save</button>
            <button id="providerEditorCancelBtn" class="btn btn-secondary" style="flex:1">Cancel</button>
        </div>
    </div>
</div>

<!-- ===== MODEL ===== -->
<div class="settings-tab-pane" data-pane="model">
    <div id="modelSelectorGrid" class="model-selector-grid"></div>
</div>

<!-- ===== SCREENSHOTS & HISTORY ===== -->
<div class="settings-tab-pane" data-pane="screenshots">
    <div class="settings-section-label">Screenshots</div>
    <label class="switch-row" for="enableScreenshots">
        <span class="switch-copy">
            <span class="switch-title">Enable Screenshots</span>
            <span class="switch-subtitle">Allow the agent to capture page screenshots.</span>
        </span>
        <input type="checkbox" id="enableScreenshots" class="switch-input" checked />
        <span class="switch-track"></span>
    </label>
    <label class="switch-row" for="sendScreenshotsAsImages">
        <span class="switch-copy">
            <span class="switch-title">Send as Images</span>
            <span class="switch-subtitle">Attach screenshots as image data instead of text descriptions.</span>
        </span>
        <input type="checkbox" id="sendScreenshotsAsImages" class="switch-input" />
        <span class="switch-track"></span>
    </label>
    <div class="form-group" style="margin-top: 8px;">
        <label for="screenshotQuality">Screenshot Quality</label>
        <select id="screenshotQuality">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high" selected>High</option>
        </select>
    </div>
    <div class="settings-section-label" style="margin-top: 16px;">History</div>
    <label class="switch-row" for="saveHistory">
        <span class="switch-copy">
            <span class="switch-title">Save History</span>
            <span class="switch-subtitle">Keep a record of past conversations.</span>
        </span>
        <input type="checkbox" id="saveHistory" class="switch-input" checked />
        <span class="switch-track"></span>
    </label>
</div>

<!-- ===== DISPLAY ===== -->
<div class="settings-tab-pane" data-pane="display">
    <div class="form-group">
        <label for="themeSelect">Theme</label>
        <select id="themeSelect"></select>
    </div>
    <div class="form-group">
        <label>Preview</label>
        <div id="themePreview" class="theme-preview-inline"></div>
    </div>
    <div class="form-group" style="margin-top: 8px;">
        <label for="uiZoom">Text Size <span class="form-value" id="uiZoomValue">100%</span></label>
        <input type="range" id="uiZoom" min="0.85" max="1.5" step="0.05" value="1" />
    </div>
    <div class="form-group">
        <label for="fontPreset">Typography</label>
        <select id="fontPreset"><option value="default">Jakarta (Default)</option><option value="geist">Geist</option><option value="soft">Nunito</option><option value="dm-sans">DM Sans</option><option value="plex">IBM Plex</option><option value="manrope">Manrope</option></select>
    </div>
    <div class="form-group">
        <label for="fontStylePreset">Font Style</label>
        <select id="fontStylePreset"><option value="normal">Regular</option><option value="medium">Medium</option><option value="semibold">Semibold</option></select>
    </div>
</div>
