<!-- ===== CONNECT (Grok only) ===== -->
<div class="settings-tab-pane" data-pane="providers">
    <select id="activeConfig" class="hidden"><option value="default">Default</option></select>

    <div class="settings-section-label">Grok</div>
    <div id="oauthProviderGrid" class="provider-row-list"></div>
    <div id="oauthDeviceCodePrompt" class="oauth-device-prompt hidden">
        <div class="oauth-device-prompt-inner">
            <div class="oauth-device-prompt-title">Enter code on <span id="oauthDeviceCodeProviderName"></span></div>
            <div id="oauthDeviceCodeValue" class="oauth-device-code-value"></div>
            <div class="oauth-device-prompt-hint">
                Go to <a id="oauthDeviceCodeLink" href="#" target="_blank" rel="noopener"></a> and enter the code above.
            </div>
            <div class="oauth-device-prompt-actions">
                <button id="oauthDeviceCodeCopyBtn" class="btn btn-secondary">Copy Code</button>
                <button id="oauthDeviceCodeOpenBtn" class="btn btn-primary">Open Link</button>
                <button id="oauthDeviceCodeCancelBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODEL ===== -->
<div class="settings-tab-pane" data-pane="model">
    <div id="modelSelectorGrid" class="model-selector-grid"></div>
</div>

<!-- ===== GENERATION ===== -->
<div class="settings-tab-pane" data-pane="generation">
    <div class="form-group">
        <label for="genTemperature">Temperature <span id="genTemperatureValue" class="form-value">0.7</span></label>
        <input type="range" id="genTemperature" min="0" max="2" step="0.1" value="0.7" />
    </div>
    <div class="form-group">
        <label for="genMaxTokens">Max Tokens</label>
        <input type="number" id="genMaxTokens" min="1" max="32000" value="4096" />
    </div>
    <div class="form-group">
        <label for="genContextLimit">Context Limit</label>
        <input type="number" id="genContextLimit" min="4000" value="200000" />
    </div>
    <div class="form-group">
        <label for="genTimeout">Timeout (ms)</label>
        <input type="number" id="genTimeout" min="5000" step="1000" value="30000" />
    </div>
    <div class="form-group">
        <label for="genScreenshotQuality">Screenshot Quality</label>
        <select id="genScreenshotQuality">
            <option value="high">High</option>
            <option value="low">Low</option>
        </select>
    </div>

    <div class="settings-section-label">Capabilities</div>
    <div class="gen-toggles">
        <label class="switch-row gen-switch-row" for="genEnableScreenshots">
            <span class="switch-copy">
                <span class="switch-title">Screenshots</span>
                <span class="switch-subtitle">Allow screenshot capture.</span>
            </span>
            <input type="checkbox" id="genEnableScreenshots" class="switch-input" />
            <span class="switch-track"></span>
        </label>
        <label class="switch-row gen-switch-row" for="genSendScreenshots">
            <span class="switch-copy">
                <span class="switch-title">Send as Images</span>
                <span class="switch-subtitle">Send raw image bytes instead of text descriptions.</span>
            </span>
            <input type="checkbox" id="genSendScreenshots" class="switch-input" />
            <span class="switch-track"></span>
        </label>
        <label class="switch-row gen-switch-row" for="genStreamResponses">
            <span class="switch-copy">
                <span class="switch-title">Streaming</span>
                <span class="switch-subtitle">Render tokens live as they arrive.</span>
            </span>
            <input type="checkbox" id="genStreamResponses" class="switch-input" />
            <span class="switch-track"></span>
        </label>
        <label class="switch-row gen-switch-row" for="genShowThinking">
            <span class="switch-copy">
                <span class="switch-title">Reasoning</span>
                <span class="switch-subtitle">Show intermediate reasoning when provided.</span>
            </span>
            <input type="checkbox" id="genShowThinking" class="switch-input" />
            <span class="switch-track"></span>
        </label>
        <label class="switch-row gen-switch-row" for="genAutoScroll">
            <span class="switch-copy">
                <span class="switch-title">Auto-scroll</span>
                <span class="switch-subtitle">Keep the latest output in view.</span>
            </span>
            <input type="checkbox" id="genAutoScroll" class="switch-input" />
            <span class="switch-track"></span>
        </label>
        <label class="switch-row gen-switch-row" for="genConfirmActions">
            <span class="switch-copy">
                <span class="switch-title">Confirm actions</span>
                <span class="switch-subtitle">Ask before sensitive browser interactions.</span>
            </span>
            <input type="checkbox" id="genConfirmActions" class="switch-input" />
            <span class="switch-track"></span>
        </label>
        <label class="switch-row gen-switch-row" for="genSaveHistory">
            <span class="switch-copy">
                <span class="switch-title">Save history</span>
                <span class="switch-subtitle">Persist chat history.</span>
            </span>
            <input type="checkbox" id="genSaveHistory" class="switch-input" />
            <span class="switch-track"></span>
        </label>
        <label class="switch-row gen-switch-row" for="genNotifyOnTurnComplete">
            <span class="switch-copy">
                <span class="switch-title">Turn completion ping</span>
                <span class="switch-subtitle">Play a sound when the model finishes its turn.</span>
            </span>
            <input type="checkbox" id="genNotifyOnTurnComplete" class="switch-input" />
            <span class="switch-track"></span>
        </label>
    </div>
</div>

<!-- ===== DISPLAY ===== -->
<div class="settings-tab-pane" data-pane="display">
    <div class="form-group">
        <label for="themeSelect">Theme</label>
        <select id="themeSelect"></select>
    </div>
    <div class="form-group">
        <label>Preview</label>
        <div id="themePreview" class="theme-preview-inline"></div>
    </div>
    <div class="form-group" style="margin-top: 8px;">
        <label for="uiZoom">Text Size <span class="form-value" id="uiZoomValue">100%</span></label>
        <input type="range" id="uiZoom" min="0.85" max="1.5" step="0.05" value="1" />
    </div>
    <div class="form-group">
        <label for="fontPreset">Typography</label>
        <select id="fontPreset"><option value="default">Jakarta (Default)</option><option value="geist">Geist</option><option value="soft">Nunito</option><option value="dm-sans">DM Sans</option><option value="plex">IBM Plex</option><option value="manrope">Manrope</option></select>
    </div>
    <div class="form-group">
        <label for="fontStylePreset">Font Style</label>
        <select id="fontStylePreset"><option value="normal">Regular</option><option value="medium">Medium</option><option value="semibold">Semibold</option></select>
    </div>
</div>
