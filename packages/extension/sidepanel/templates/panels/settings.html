<div id="settingsPanel" class="right-panel-content hidden" data-panel="settings">
    <div class="panel-header panel-header-with-actions">
        <div class="panel-header-copy">
            <span class="panel-title">Settings</span>
        </div>
        <button id="settingsOpenAccountBtn" class="panel-avatar-button" type="button" title="Account" data-tooltip="Account" aria-label="Open account">
            <span id="settingsAccountAvatar" class="panel-avatar-initials">A</span>
        </button>
    </div>
    <div class="settings-content settings-content-redesign">
        <div class="settings-tabs settings-tabs-redesign" role="tablist" aria-label="Settings sections">
            <button id="settingsTabProvidersBtn" class="settings-tab-button active" data-tab="providers" role="tab" aria-selected="true">Connect</button>
            <button id="settingsTabModelBtn" class="settings-tab-button" data-tab="model" role="tab" aria-selected="false">Model</button>
            <button id="settingsTabScreenshotsBtn" class="settings-tab-button" data-tab="screenshots" role="tab" aria-selected="false">Screenshots</button>
            <button id="settingsTabDisplayBtn" class="settings-tab-button" data-tab="display" role="tab" aria-selected="false">Display</button>
            <button id="settingsTabPermissionsBtn" class="settings-tab-button" data-tab="permissions" role="tab" aria-selected="false">Permissions</button>
        </div>
        <div id="settingsTabProviders" class="tab-panel" data-tab="providers"></div>
        <div id="settingsTabModel" class="tab-panel hidden" data-tab="model"></div>
        <div id="settingsTabScreenshots" class="tab-panel hidden" data-tab="screenshots"></div>
        <div id="settingsTabDisplay" class="tab-panel hidden" data-tab="display"></div>
        <div id="settingsTabPermissions" class="tab-panel hidden" data-tab="permissions"></div>
    </div>
</div>
